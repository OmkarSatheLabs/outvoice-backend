spring:
  application:
    name: outvoice
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/outvoice}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:local-db@123}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

# Org-layer JWT — for customer users (email/mobile + password login)
jwt:
  secret: ${JWT_SECRET}
  expiry-ms: ${JWT_EXPIRY_MS:86400000}

# Platform JWT — completely separate secret; tokens cannot be cross-used
platform:
  jwt:
    secret: ${PLATFORM_JWT_SECRET}
    expiry-ms: ${PLATFORM_JWT_EXPIRY_MS:86400000}
  # Default Platform Super Admin — seeded on first run if no platform users exist
  admin:
    email: ${PLATFORM_ADMIN_EMAIL:admin@outvoice.internal}
    password: ${PLATFORM_ADMIN_PASSWORD:changeme-immediately}

app:
  # Set ALLOW_DUPLICATE_SIGNUP=true to skip 409 on repeated sign-ups (dev/test only)
  allow-duplicate-signup: ${ALLOW_DUPLICATE_SIGNUP:false}
  # Comma-separated list of allowed CORS origins; update for production
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

rate-limit:
  auth:
    # Max requests per IP within the refill window for /api/auth/** endpoints
    capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}
    refill-period-seconds: ${RATE_LIMIT_AUTH_REFILL_SECONDS:60}
